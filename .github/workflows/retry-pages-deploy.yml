name: Retry Pages Deploy

# O deploy do GitHub Pages ("pages build and deployment", workflow interno do
# GitHub — não editável no nosso repositório) falha esporadicamente com um
# erro transitório de infraestrutura ("Deployment failed, try again later"),
# resolvido na prática clicando "Re-run jobs" manualmente. Este workflow
# automatiza esse clique: dispara quando o Pages deploy termina e, se falhou,
# reenvia via API os jobs que falharam. Limitado a 3 tentativas (run_attempt)
# para não entrar em loop caso o problema não seja transitório.
on:
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]

permissions:
  actions: write

jobs:
  retry:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Aguardar antes de tentar de novo
        run: sleep 60

      - name: Reenviar jobs que falharam
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/rerun-failed-jobs"
